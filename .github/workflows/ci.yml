name: CI

on: [push, pull_request]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Controllo sintassi (py_compile)
        run: |
          python -m py_compile firmware/*.py
          python -m py_compile backend/app/*.py
          python -m py_compile scripts/*.py
      - name: Validazione JSON/YAML
        run: |
          python -c "import json; json.load(open('docker-stack/nodered/data/flows.json'))"
          python -c "import json; json.load(open('docker-stack/grafana/provisioning/dashboards/pulseguard_dashboard.json'))"
